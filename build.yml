name: Build Incognito OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debootstrap squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin grub-common \
            xorriso mtools \
            wget curl

      - name: Fix tcpdump dpkg sysusers bug (GitHub Actions runner issue)
        run: |
          sudo rm -f /usr/lib/sysusers.d/tcpdump.conf
          sudo dpkg --configure -a || true
          sudo apt-get install -f -y || true

      - name: Build Incognito OS (Debian base)
        run: |
          sudo chmod +x scripts/build/build-debian-base.sh
          sudo bash scripts/build/build-debian-base.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Check ISO size & RAM estimate
        run: |
          ls -lh *.iso 2>/dev/null || echo "ISO not found"
          du -sh build-root/ 2>/dev/null || true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: incognito-os-${{ github.run_number }}
          path: "*.iso"
          retention-days: 14
          if-no-files-found: error
