name: Build Incognito OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            debian-archive-keyring \
            debootstrap \
            squashfs-tools \
            xorriso \
            mtools \
            wget curl gnupg

          # Install live-build dari Debian repo
          wget -q https://deb.debian.org/debian/pool/main/l/live-build/live-build_20230502_all.deb
          sudo dpkg -i live-build_20230502_all.deb || sudo apt-get install -f -y

      - name: Fix live-build chroot_hacks PATH issue
        run: |
          HACKS_SCRIPT="/usr/lib/live/build/chroot_hacks"
          echo "=== Current chroot_hacks content ==="
          cat "$HACKS_SCRIPT" || echo "File not found at $HACKS_SCRIPT"
          find /usr/lib/live -name "*hack*" 2>/dev/null || true

          # Buat wrapper script update-initramfs di /usr/local/bin
          # yang dipanggil sebelum lb build
          sudo tee /usr/local/bin/update-initramfs << 'WRAPPER'
#!/bin/bash
exec /usr/sbin/update-initramfs "$@"
WRAPPER
          sudo chmod +x /usr/local/bin/update-initramfs

          # Juga patch semua kemungkinan path di live-build scripts
          for f in $(find /usr/lib/live -type f); do
            if grep -q "update-initramfs" "$f" 2>/dev/null; then
              echo "Found in: $f"
              sudo sed -i \
                's|update-initramfs|/usr/sbin/update-initramfs|g' "$f" \
                2>/dev/null || true
            fi
          done

      - name: Build Incognito OS
        run: |
          sudo chmod +x scripts/build/build-debian-base.sh
          sudo bash scripts/build/build-debian-base.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: incognito-os-${{ github.run_number }}
          path: "*.iso"
          retention-days: 14
          if-no-files-found: error
