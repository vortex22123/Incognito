name: Build Incognito OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            live-build \
            debian-archive-keyring \
            debootstrap \
            squashfs-tools \
            xorriso \
            mtools \
            wget curl gnupg

      - name: Build Incognito OS
        run: |
          sudo chmod +x scripts/build/build-debian-base.sh
          sudo bash scripts/build/build-debian-base.sh
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: incognito-os-${{ github.run_number }}
          path: "*.iso"
          retention-days: 14
          if-no-files-found: error
