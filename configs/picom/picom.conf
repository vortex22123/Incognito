# Incognito OS - Picom config (transparansi ringan, optional compositor)

backend = "glx";
vsync = true;

# --- Shadows ---
shadow = true;
shadow-radius = 8;
shadow-opacity = 0.5;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
    "class_g = 'Polybar'",
    "class_g = 'Rofi'"
];

# --- Transparansi ---
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "90:class_g = 'x-terminal-emulator' && !focused"
];

# --- Fading ---
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# --- Performance (penting untuk target 4GB RAM / low CPU) ---
unredir-if-possible = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
