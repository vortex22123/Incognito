# Incognito OS Picom Configuration

# Backend
backend = "glx";
vsync = true;

# Opacity
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "90:class_g = 'Rofi'",
  "95:class_g = 'Polybar'"
];

# Blur
blur-method = "dual_kawase";
blur-strength = 8;
blur-background = true;
blur-background-frame = true;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.7;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-exclude-reg = "window_type = 'dock'\|window_type = 'desktop'\|window_type = 'menu'\|window_type = 'tooltip'\|window_type = 'notification'\|class_g = 'Polybar'\|class_g = 'Rofi'\|class_g = 'Alacritty'\|_NET_WM_WINDOW_TYPE@:32a = 'dock'\|_NET_WM_WINDOW_TYPE@:32a = 'desktop'\|_NET_WM_WINDOW_TYPE@:32a = 'menu'\|_NET_WM_WINDOW_TYPE@:32a = 'tooltip'\|_NET_WM_WINDOW_TYPE@:32a = 'notification'";

# Fading
fading = true;
fading-delta = 4;
fading-in-step = 0.03;
fading-out-step = 0.03;

# Animations
animations = true;
animation-stiffness = 300;
animation-wsize = 0.3;
animation-fps = 60;

# Corner radius
corner-radius = 6;

# Window type settings
wintype:
{
  tooltip = { fade = true; shadow = false; };
  dropdown_menu = { fade = true; shadow = false; };
  popup_menu = { fade = true; shadow = false; };
  dock = { fade = false; shadow = false; };
  desktop = { fade = false; shadow = false; };
};

# Focus effects
focus-exclude = [ "class_g = 'Cairo-Dock'\|class_g = 'Plank'\|class_g = 'Polybar'" ];

# Inactive opacity
inactive-opacity = 0.8;
active-opacity = 1.0;
frame-opacity = 0.8;

# Experimental backends
experimental-backends = true;
