#
# DO NOT EDIT THIS FILE
#
# It is automatically generated by grub-mkconfig using templates
# from /etc/grub.d and settings from /etc/default/grub
#

# Incognito OS GRUB Configuration
set default="0"
set timeout=5
set timeout_style=menu
set color_normal=light-gray/black
set color_highlight=green/black

if [ "x${GRUB_BACKGROUND}" != "x" ] ; then
  set background_image="${GRUB_BACKGROUND}"
  set background_color=black
fi

if [ "x${GRUB_THEME}" != "x" ] ; then
  set theme="${GRUB_THEME}"
fi

if [ "x${GRUB_GFXMODE}" != "x" ] ; then
  set gfxmode="${GRUB_GFXMODE}"
  set gfxpayload="${GRUB_GFXPAYLOAD_LINUX}"
  insmod gfxterm
  insmod vbe
  if [ "x${GRUB_GFXMODE}" = "xauto" ] ; then
    set gfxmode="auto"
  fi
  terminal_output gfxterm
fi

set menu_color_normal=light-gray/black
set menu_color_highlight=green/black

set lang=en_US
set locale_dir=($root)/boot/grub/locale
set enable_progress_indicator=1

if [ "x${GRUB_DISABLE_SUBMENU}" = "xtrue" ] ; then
  set submenu_style=menu
else
  set submenu_style=submenu
fi

# Incognito OS Menu Entries
menuentry "Incognito OS (Default)" --class incognito --class gnu-linux --class gnu --class os {
    set root='(hd0,1)'
    linux /boot/vmlinuz-linux root=/dev/sda1 ro quiet splash
    initrd /boot/initrd.img-linux
}

menuentry "Incognito OS (Tor Enabled)" --class incognito --class gnu-linux --class gnu --class os {
    set root='(hd0,1)'
    linux /boot/vmlinuz-linux root=/dev/sda1 ro quiet splash tor=on
    initrd /boot/initrd.img-linux
}

menuentry "Incognito OS (Tor Disabled)" --class incognito --class gnu-linux --class gnu --class os {
    set root='(hd0,1)'
    linux /boot/vmlinuz-linux root=/dev/sda1 ro quiet splash tor=off
    initrd /boot/initrd.img-linux
}

menuentry "Incognito OS (Recovery Mode)" --class incognito --class gnu-linux --class gnu --class os {
    set root='(hd0,1)'
    linux /boot/vmlinuz-linux root=/dev/sda1 ro single
    initrd /boot/initrd.img-linux
}

menuentry "UEFI Firmware Settings" --class uefi --class firmware {
    fwsetup
}
