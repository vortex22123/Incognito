; Incognito OS - Polybar config
; Dark theme dengan aksen hijau/cyan sesuai README Visual Identity

[colors]
background = #1e2327
background-alt = #2a2f34
foreground = #d4d4d4
primary = #00ff9c
secondary = #00d9ff
alert = #ff5555
disabled = #707880

[bar/main]
width = 100%
height = 28pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 0pt
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = "JetBrains Mono:size=10;2"
modules-left = openbox-workspaces
modules-center = date
modules-right = tor-status network cpu memory
cursor-click = pointer
enable-ipc = true

[module/openbox-workspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M:%S
label = %date% %time%

[module/tor-status]
type = custom/script
exec = ~/.config/polybar/scripts/tor-status.sh
interval = 5
click-left = /usr/local/bin/tor-toggle toggle
format-foreground = ${colors.primary}

[module/network]
type = internal/network
interface-type = wired
label-connected = "NET %downspeed% / %upspeed%"
label-disconnected = "NET offline"

[module/cpu]
type = internal/cpu
interval = 2
label = "CPU %percentage%%"

[module/memory]
type = internal/memory
interval = 2
label = "MEM %percentage_used%%"
