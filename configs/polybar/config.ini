[colors]
; Incognito OS Color Scheme
background = #0a0a0a
foreground = #ffffff
primary = #00ff88
secondary = #00ccff
alert = #ff4444

; Background colors
bg0 = #0a0a0a
bg1 = #1a1a1a
bg2 = #2a2a2a

; Foreground colors
fg0 = #ffffff
fg1 = #cccccc
fg2 = #888888

; Accent colors
accent1 = #00ff88
accent2 = #00ccff
accent3 = #ffaa00
accent4 = #ff4444

[bar/incognito-bar]
; Main Polybar configuration
width = 100%
height = 24
radius = 0
fixed-center = true

background = ${colors.bg0}
foreground = ${colors.fg0}

padding-left = 2
padding-right = 2

; Font configuration
font-0 = DejaVu Sans Mono:size=10;0
font-1 = Font Awesome 6 Free:size=10;2
font-2 = Font Awesome 6 Brands:size=10;2

; Modules
modules-left = menu terminal file firefox chromium
modules-center = ram cpu tor clock
modules-right = power

; Tray configuration
tray-position = right
tray-padding = 2
tray-background = ${colors.bg1}
tray-foreground = ${colors.fg0}

; Window configuration
window-padding-x = 2
window-padding-y = 2

; Module: Menu (Rofi launcher)
[module/menu]
type = custom/text
content = 
content-foreground = ${colors.accent1}
click-left = rofi -show drun

; Module: Terminal
[module/terminal]
type = custom/text
content = 
content-foreground = ${colors.accent2}
click-left = alacritty

; Module: File Manager
[module/file]
type = custom/text
content = 
content-foreground = ${colors.accent3}
click-left = pcmanfm

; Module: Firefox
[module/firefox]
type = custom/text
content = 
content-foreground = ${colors.accent4}
click-left = firefox

; Module: Chromium
[module/chromium]
type = custom/text
content = 
content-foreground = ${colors.accent1}
click-left = chromium

; Module: RAM
[module/ram]
type = internal/ram
interval = 2
format = <label>
format-foreground = ${colors.fg0}
format-padding = 2

label = %percentage_used%%
label-foreground = ${colors.accent1}

; Module: CPU
[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-foreground = ${colors.fg0}
format-padding = 2

label = %percentage% %
label-foreground = ${colors.accent2}

; Module: Tor Status
[module/tor]
type = custom/script
exec = /usr/local/incognito/scripts/tor-status.sh
interval = 5
tail = true
format = <label>
format-foreground = ${colors.fg0}
format-padding = 2

label = %output%
label-foreground = ${colors.accent1}
click-left = toggle-tor

; Module: Clock
[module/clock]
type = internal/date
interval = 1

date = %H:%M
format-prefix = " "
format-prefix-foreground = ${colors.accent2}
format-suffix = ""

; Module: Power
[module/power]
type = custom/text
content = ⏻
content-foreground = ${colors.accent4}

menu-0 = Shutdown
menu-0-exec = systemctl poweroff
menu-1 = Restart
menu-1-exec = systemctl reboot
menu-2 = Logout
menu-2-exec = openbox --exit
menu-3 = Suspend
menu-3-exec = systemctl suspend
